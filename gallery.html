<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Team Calico</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #100C09;
            --card-bg: #1E1510;
            --card-bg2: #231A13;
            --accent: #00ADB5;
            --calico-orange: #E8924A;
            --calico-cream: #F5ECD7;
            --gold: #E8B84B;
            --text-main: #F2EAE0;
            --text-muted: #9A8A7A;
            --font-main: 'Poppins', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* CALICO FUR TEXTURE OVERLAY */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: 
                radial-gradient(ellipse at 15% 20%, rgba(232, 146, 74, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 75%, rgba(232, 146, 74, 0.05) 0%, transparent 35%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 173, 181, 0.03) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        body > * { position: relative; z-index: 1; }

        /* NAVBAR */
        header { position: fixed; top: 0; width: 100%; padding: 18px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(16, 12, 9, 0.88); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid rgba(232, 146, 74, 0.12); }
        .logo-wrap { display: flex; align-items: center; gap: 11px; cursor: pointer; text-decoration: none; color: inherit; }
        .logo-wrap img { height: 34px; transition: transform 0.3s, filter 0.3s; filter: drop-shadow(0 0 6px rgba(232, 146, 74, 0.3)); }
        .logo-wrap:hover img { transform: scale(1.08) rotate(-3deg); filter: drop-shadow(0 0 10px rgba(232, 146, 74, 0.5)); }
        .logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: var(--text-main); transition: color 0.3s; }
        .logo-wrap:hover .logo-text { color: var(--calico-orange); }

        .back-btn { font-weight: 600; font-size: 0.9rem; transition: color 0.3s; cursor: pointer;}
        .back-btn:hover { color: var(--calico-orange); }

        .gallery-page-container { padding: 120px 10% 60px; max-width: 1600px; margin: 0 auto; min-height: 100vh;}
        .page-header { text-align: center; margin-bottom: 60px; }
        .page-header h1 { font-size: 3rem; color: var(--calico-orange); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .page-header p { color: var(--text-muted); font-size: 1.1rem;}

        .paw-divider { text-align: center; margin: 10px 0 30px; opacity: 0.35; font-size: 1.2rem; letter-spacing: 12px; }

        /* FULL GALLERY STYLES - MASONRY (Resimleri Kırpmaz) */
        .full-category { margin-bottom: 80px; }
        .full-title { font-size: 2rem; color: var(--gold); border-bottom: 1px solid rgba(232, 146, 74, 0.15); padding-bottom: 10px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;}
        
        .full-grid {
            column-count: 3; /* 3 Sütunlu Duvar Mantığı */
            column-gap: 20px;
        }
        
        .full-item {
            break-inside: avoid; /* Resmin yarısı alta geçmesin */
            margin-bottom: 20px;
            background-color: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(232, 146, 74, 0.08); 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s, box-shadow 0.3s; 
            cursor: pointer;
        }
        .full-item:hover { transform: scale(1.03) translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: var(--calico-orange); z-index: 2;}
        .full-item img {
            width: 100%;
            height: auto; /* Kırpılmasını engeller, orijinal oranında kalır */
            display: block;
        }

        /* LIGHTBOX (Tam Ekran Resim Büyütme) */
        .lightbox {
            display: none; position: fixed; z-index: 2000; inset: 0;
            background: rgba(10, 8, 6, 0.95); backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .close-lightbox { position: absolute; top: 20px; right: 30px; font-size: 40px; color: var(--text-main); cursor: pointer; transition: 0.3s; }
        .close-lightbox:hover { color: var(--calico-orange); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(232,146,74,0.2); color: var(--text-main); border: none; font-size: 30px; padding: 15px 20px; cursor: pointer; border-radius: 50%; transition: 0.3s; }
        .nav-btn:hover { background: var(--calico-orange); color: #fff; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--calico-orange); border-radius: 3px; }

        @media (max-width: 900px) { .full-grid { column-count: 2; } }
        @media (max-width: 600px) { header { padding: 16px 20px; flex-direction: column; gap: 14px; } .full-grid { column-count: 1; } }
    </style>
</head>
<body>

    <audio id="meow-sfx" src="/Sounds/meow.mp3" preload="auto"></audio>

    <header>
        <a href="index.html" class="logo-wrap meow-btn">
            <img src="/Images/OtherImages/Logo_Header.png" alt="Team Calico" onerror="this.style.display='none'">
            <span class="logo-text">TEAM CALICO</span>
        </a>
        <a href="index.html" class="back-btn meow-btn">&larr; Back to Home</a>
    </header>

    <div class="gallery-page-container">
        <div class="page-header">
            <h1>Calico Archives</h1>
            <p>Behind the scenes, game jams, and our development journey.</p>
            <div class="paw-divider">🐾 🐾 🐾</div>
        </div>
        <div id="full-gallery-root"></div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="lightbox-img" src="" alt="Gallery Image">
        <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script>
        const meowSfx = document.getElementById('meow-sfx');
        function playMeow() { meowSfx.currentTime = 0; meowSfx.play().catch(() => {}); }
        document.querySelectorAll('.meow-btn').forEach(btn => { btn.addEventListener('click', playMeow); });

        const galleryConfig = [
            { folder: "RakunGameJam",   title: "Rakun Game Jam",   images: ["rakun1.jpg","rakun2.jpg","rakun3.jpg","rakun4.jpg","rakun5.jpeg","rakun6.jpg","rakun7.jpg"] },
            { folder: "TeduGameJam",    title: "TEDU Game Jam",    images: ["tedu1.png","tedu2.jpg","tedu3.jpg","tedu4.jpg","tedu5.jpeg"] },
            { folder: "AkdenizGameJam", title: "Akdeniz Game Jam", images: ["akdeniz1.jpeg","akdeniz2.jpeg","akdeniz5.png"] },
            { folder: "AydinGameJam",   title: "Aydın Game Jam",   images: ["Aydin1.jpeg","Aydin2.jpg"] }
        ];

        let lightboxImages = []; // Büyütülecek tüm resimlerin listesi
        let currentImageIndex = 0;

        function buildFullGallery() {
            const container = document.getElementById("full-gallery-root");
            
            galleryConfig.forEach(jam => {
                if (jam.images.length === 0) return;

                let catDiv = document.createElement("div");
                catDiv.className = "full-category";
                
                let title = document.createElement("h2");
                title.className = "full-title";
                title.innerText = jam.title;
                catDiv.appendChild(title);

                let grid = document.createElement("div");
                grid.className = "full-grid";

                for(let i = 0; i < jam.images.length; i++) {
                    let imagePath = `/Images/Galery/${jam.folder}/${jam.images[i]}`;
                    
                    // Resimleri lightbox listesine ekle
                    let globalIndex = lightboxImages.length;
                    lightboxImages.push(imagePath);

                    let imgWrap = document.createElement("div");
                    imgWrap.className = "full-item";
                    imgWrap.onclick = () => openLightbox(globalIndex); // Tıklayınca büyüt
                    
                    // Artık arka plan olarak değil, normal img olarak basıyoruz ki kırpılmasın
                    let imgTag = document.createElement("img");
                    imgTag.src = imagePath;
                    imgTag.alt = jam.title;
                    
                    imgWrap.appendChild(imgTag);
                    grid.appendChild(imgWrap);
                }
                catDiv.appendChild(grid);
                container.appendChild(catDiv);
            });
        }

        // --- LIGHTBOX KONTROLLERİ ---
        function openLightbox(index) {
            currentImageIndex = index;
            document.getElementById('lightbox-img').src = lightboxImages[currentImageIndex];
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            if(currentImageIndex < 0) currentImageIndex = lightboxImages.length - 1; // Başa sar
            if(currentImageIndex >= lightboxImages.length) currentImageIndex = 0; // Sona sar
            document.getElementById('lightbox-img').src = lightboxImages[currentImageIndex];
        }

        // Klavye Ok Tuşları ile Kontrol
        document.addEventListener('keydown', function(e) {
            if(!document.getElementById('lightbox').classList.contains('active')) return;
            if(e.key === "ArrowLeft") changeImage(-1);
            if(e.key === "ArrowRight") changeImage(1);
            if(e.key === "Escape") closeLightbox();
        });

        // Işıklı kutunun dışında siyah alana tıklayınca kapat
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if(e.target === this) closeLightbox();
        });

        document.addEventListener("DOMContentLoaded", buildFullGallery);
    </script>
</body>
</html>

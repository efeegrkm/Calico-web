<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Team Calico</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --accent: #00ADB5;
            --text-main: #eeeeee;
            --text-muted: #a0a5b1;
            --font-main: 'Poppins', sans-serif;
            --gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden;}
        a { text-decoration: none; color: inherit; }

        header { padding: 20px 50px; background: rgba(15, 17, 21, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;}
        .logo img { height: 40px; transition: transform 0.3s;}
        .logo img:hover { transform: scale(1.05); }
        .back-btn { font-weight: 600; font-size: 0.9rem; transition: color 0.3s; }
        .back-btn:hover { color: var(--accent); }

        .gallery-page-container { padding: 60px 10%; max-width: 1600px; margin: 0 auto; min-height: 100vh;}
        .page-header { text-align: center; margin-bottom: 60px; }
        .page-header h1 { font-size: 3rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;}
        .page-header p { color: var(--text-muted); font-size: 1.1rem;}

        /* Tam Galeri Stilleri */
        .full-category { margin-bottom: 80px; }
        .full-title { font-size: 2rem; color: var(--gold); border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 30px; }
        .full-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; grid-auto-rows: 250px; grid-auto-flow: dense;}
        
        .full-item { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; cursor: pointer;}
        .full-item:hover { transform: scale(1.03) translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-color: var(--accent); z-index: 2;}
        
        /* Çeşitlilik katmak için yatay/dikey büyüklük sınıfları */
        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 15px; }
            .wide, .tall { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="/Images/OtherImages/Logo_Header.png" alt="Team Calico" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%2240%22><text y=%2225%22 fill=%22%2300ADB5%22 font-family=%22sans-serif%22 font-size=%2220%22 font-weight=%22bold%22>TEAM CALICO</text></svg>'"></a>
        </div>
        <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </header>

    <div class="gallery-page-container">
        <div class="page-header">
            <h1>Calico Archives</h1>
            <p>Behind the scenes, game jams, and our development journey.</p>
        </div>

        <div id="full-gallery-root"></div>
    </div>

    <script>
        // === DİNAMİK GALERİ AYARLARI ===
        const galleryConfig = [
            { 
                folder: "RakunGameJam", 
                title: "Rakun Game Jam", 
                images: ["rakun1.jpg", "rakun2.jpg", "rakun3.jpg", "rakun4.jpg", "rakun5.jpeg", "rakun6.jpg", "rakun7.jpg"] 
            },
            { 
                folder: "TeduGameJam", 
                title: "TEDU Game Jam", 
                images: ["tedu1.png", "tedu2.jpg", "tedu3.jpg", "tedu4.jpg", "tedu5.jpeg"]
            },
            { 
                folder: "AkdenizGameJam", 
                title: "Akdeniz Game Jam", 
                images: ["akdeniz1.jpeg", "akdeniz2.jpeg", "akdeniz3.jpeg", "akdeniz4.jpeg", "akdeniz5.png"]
            },
            { 
                folder: "AydinGameJam", 
                title: "Aydın Game Jam", 
                images: ["Aydin1.jpeg", "Aydin2.jpg"] 
            }
        ];

        function buildFullGallery() {
            const container = document.getElementById("full-gallery-root");
            
            galleryConfig.forEach(jam => {
                if (jam.images.length === 0) return;

                let catDiv = document.createElement("div");
                catDiv.className = "full-category";
                
                let title = document.createElement("h2");
                title.className = "full-title";
                title.innerText = jam.title;
                catDiv.appendChild(title);

                let grid = document.createElement("div");
                grid.className = "full-grid";

                // O klasördeki tüm resimleri döngüyle basıyoruz
                for(let i = 0; i < jam.images.length; i++) {
                    let imgDiv = document.createElement("div");
                    
                    // Masonry (Düzensiz Duvar) görünümü için bazı resimleri geniş veya uzun yapıyoruz
                    let extraClass = "";
                    if((i + 1) % 5 === 0) extraClass = "wide"; // Her 5. resim yatay uzun
                    else if ((i + 1) % 4 === 0) extraClass = "tall"; // Her 4. resim dikey uzun
                    
                    imgDiv.className = `full-item ${extraClass}`;
                    imgDiv.style.backgroundImage = `url('/Images/Galery/${jam.folder}/${jam.images[i]}')`;
                    
                    grid.appendChild(imgDiv);
                }

                catDiv.appendChild(grid);
                container.appendChild(catDiv);
            });
        }
        
        document.addEventListener("DOMContentLoaded", buildFullGallery);
    </script>
</body>
</html>
